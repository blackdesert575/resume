name: ci
# run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: [push]

permissions:
  contents: write

jobs:
  build_latex:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: single-page-cv/package-lock.json
      - name: Install single-page-cv dependencies
        working-directory: single-page-cv
        run: npm ci
      - name: Validate structured content
        working-directory: single-page-cv
        run: npm run validate:content
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: yh_resume.tex
          working_directory: src
      - name: Build html
        uses: SichangHe/pdf2htmlEX-action@v0.0.2
        with:
          arguments: --zoom 1.3 --dest-dir output src/yh_resume.pdf index.html        
      # - name: Upload PDF file
      #   uses: actions/upload-artifact@v5
      #   with:
      #     name: PDF
      #     path: src/yh_resume.pdf
      - name: Run scripts/pipelines_ci.sh to update html
        run: ./scripts/pipelines_ci.sh      
      - uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions                
